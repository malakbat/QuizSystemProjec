<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מערכת מבחנים - הרשמה</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="card p-4 mx-auto shadow-sm" style="max-width: 500px;">
      <h2 class="text-center mb-4">הרשמה למערכת</h2>
      
      <div id="alertMsg" class="alert d-none" role="alert"></div>

      <form id="registerForm">
        <div class="mb-3">
          <label for="regUsername" class="form-label">שם משתמש:</label>
          <input type="text" id="regUsername" class="form-control" required placeholder="הקלידו שם משתמש">
        </div>
        
        <div class="mb-3">
          <label for="regPassword" class="form-label">סיסמה:</label>
          <input type="password" id="regPassword" class="form-control" required placeholder="הקלידו סיסמה">
        </div>

        <div class="mb-3">
          <label class="form-label">סוג משתמש:</label>
          <select id="regRole" class="form-select" required>
            <option value="student">סטודנט (Student)</option>
            <option value="teacher">מורה / מרצה (Teacher)</option>
          </select>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-2">הרשם עכשיו</button>
      </form>

      <hr class="my-4">
      <div class="text-center">
        <p class="mb-0">כבר יש לך חשבון? <a href="login.html" class="text-decoration-none">להתחברות כאן</a></p>
        <a href="index.html" class="btn btn-link btn-sm mt-2 text-secondary">חזרה לדף הבית</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/register.js"></script>
</body>
</html>

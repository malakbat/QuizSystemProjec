<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מערכת מבחנים - התחברות</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="card p-4 mx-auto shadow-sm" style="max-width: 500px;">
      <h2 class="text-center mb-4">התחברות למערכת</h2>
      
      <div id="alertMsg" class="alert d-none" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="loginUsername" class="form-label">שם משתמש:</label>
          <input type="text" id="loginUsername" class="form-control" required placeholder="הקלידו שם משתמש">
        </div>
        
        <div class="mb-3">
          <label for="loginPassword" class="form-label">סיסמה:</label>
          <input type="password" id="loginPassword" class="form-control" required placeholder="הקלידו סיסמה">
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2">התחבר</button>
      </form>

      <hr class="my-4">
      <div class="text-center">
        <p class="mb-0">אין לך חשבון עדיין? <a href="register.html" class="text-decoration-none">להרשמה כאן</a></p>
        <a href="index.html" class="btn btn-link btn-sm mt-2 text-secondary">חזרה לדף הבית</a>
      </div>
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>

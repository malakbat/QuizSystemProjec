<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>מערכת מבחנים - דף בית</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <div class="container py-5 text-center">
    <div class="card p-5 mx-auto shadow-sm" style="max-width: 600px;">
      <h1 class="mb-3">מערכת מבחנים דיגיטלית</h1>
      <h4 class="text-primary">סטודנטית: Malak Batheesh</h4>
      <p class="text-muted">תעודת זהות: 123456789</p>
      
      <hr class="my-4">
      
      <div id="authStatusArea">
        <h5>ניווט במערכת:</h5>
        <div class="d-grid gap-2 col-8 mx-auto mt-3">
          <a href="login.html" class="btn btn-primary btn-lg">דף התחברות</a>
          <a href="register.html" class="btn btn-outline-secondary">דף הרשמה למשתמש חדש</a>
        </div>
      </div>

      <div class="mt-4">
        <a href="https://github.com/malakbat/QuizSystemProjec" target="_blank" class="text-decoration-none">🔗 קישור לפרויקט ב-GitHub</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { AuthService } from "./js/Services/AuthService.js";
    const authService = new AuthService();
    const currentUser = authService.getCurrentUser();
    const authStatusArea = document.getElementById("authStatusArea");

    // אם יש משתמש מחובר, נציג לו כפתור כניסה לאזור האישי וכפתור התנתקות
    if (currentUser) {
      const dashboardUrl = currentUser.role === "teacher" ? "teacher.html" : "student.html";
      const roleName = currentUser.role === "teacher" ? "מורה" : "סטודנט";
      
      authStatusArea.innerHTML = `
        <div class="alert alert-info">מחובר כעת: <strong>${currentUser.username}</strong> (${roleName})</div>
        <div class="d-grid gap-2 col-8 mx-auto mt-3">
          <a href="${dashboardUrl}" class="btn btn-success btn-lg">כניסה לאזור האישי שלך</a>
          <button id="logoutBtn" class="btn btn-danger">התנתק מהמערכת</button>
        </div>
      `;

      document.getElementById("logoutBtn").addEventListener("click", () => {
        authService.logout();
        window.location.reload(); // רענון הדף לעדכון הסטטוס
      });
    }
  </script>
</body>
</html>

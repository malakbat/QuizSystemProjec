<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פאנל מרצה - ניהול מבחנים</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">אזור מורה - ניהול מערכת המבחנים</span>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm">התנתק מהמערכת</button>
    </div>
  </nav>

  <div class="container py-2">
    <div class="row">
      <div class="col-md-5">
        <div class="card mb-4">
          <div class="card-header bg-primary text-white font-weight-bold">
            יצירת מבחן חדש
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">שם המבחן (Exam Title)</label>
              <input id="examTitle" type="text" class="form-control" placeholder="דוגמה: יסודות ה-JavaScript">
            </div>
            <hr>
            <h5>הוספת שאלה אמריקאית</h5>
            <div class="mb-3">
              <label class="form-label">טקסט השאלה</label>
              <input id="questionText" type="text" class="form-control" placeholder="דוגמה: מהו const?">
            </div>
            <div class="mb-3">
              <label class="form-label">תשובה 1</label>
              <input id="answer1" type="text" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">תשובה 2</label>
              <input id="answer2" type="text" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">תשובה 3</label>
              <input id="answer3" type="text" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">תשובה 4</label>
              <input id="answer4" type="text" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label">מספר התשובה הנכונה (1-4)</label>
              <input id="correctAnswer" type="number" class="form-control" min="1" max="4" placeholder="1-4">
            </div>
            <button id="addQuestionBtn" class="btn btn-success w-100 mb-2">הוסף שאלה למבחן</button>
            <button id="saveExamBtn" class="btn btn-primary w-100">שמור מבחן ב-Storage</button>
            <div id="builderMessage" class="mt-3"></div>
          </div>
        </div>
      </div>

      <div class="col-md-7">
        <div class="card mb-4">
          <div class="card-header bg-secondary text-white">
            מבחנים שנוצרו במערכת
          </div>
          <div class="card-body">
            <div id="examList"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-header bg-warning">
            תצוגה מקדימה והרצת מבחן
          </div>
          <div class="card-body">
            <div id="examRunner">
              <p class="text-muted">בחר מבחן מהרשימה כדי לצפות בו או להריץ אותו.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/teacher.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>אזור סטודנט - ביצוע מבחנים</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1" id="welcomeStudentHeader">אזור סטודנט</span>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm">התנתק מהמערכת</button>
    </div>
  </nav>

  <div class="container py-2">
    <div class="row">
      
      <div class="col-md-4">
        <div class="card mb-4 shadow-sm">
          <div class="card-header bg-info text-white">ההישגים שלי</div>
          <div class="card-body text-center">
            <h5 class="card-title">ממוצע ציונים הנוכחי:</h5>
            <h2 id="studentAverage" class="text-primary">0%</h2>
            <hr>
            <h6>מבחנים שביצעת:</h6>
            <div id="studentHistoryList" class="text-start mt-2">
              <p class="text-muted small text-center">טרם ביצעת מבחנים במערכת.</p>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card mb-4 shadow-sm">
          <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
            <span>מבחנים זמינים במערכת</span>
            <input type="text" id="searchExamInput" class="form-control form-control-sm w-50" placeholder="🔍 חיפוש מבחן לפי שם...">
          </div>
          <div class="card-body">
            <div id="examList"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-warning">
            ביצוע מבחן פעיל
          </div>
          <div class="card-body">
            <div id="examRunner">
              <p class="text-muted">בחרו מבחן מרשימת המבחנים הזמינים למעלה כדי להתחיל במענה.</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="js/student.js"></script>
</body>
</html>
